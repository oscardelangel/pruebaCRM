<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Inmobiliario - Iniciar Sesión</title>
    <!-- Reutiliza tus CSS existentes -->
    <!-- CSS específico para login -->
  <script type="module" crossorigin src="/pruebaCRM/assets/login-B-Vwn1u6.js"></script>
  <link rel="modulepreload" crossorigin href="/pruebaCRM/assets/dist-BDHGYoBr.js">
  <link rel="stylesheet" crossorigin href="/pruebaCRM/assets/login-DTmh9wZ-.css">
  <link rel="stylesheet" crossorigin href="/pruebaCRM/assets/componentes-DOM61V8u.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🏢 CRM Inmobiliario</h1>
                <p>Acceso para asesores y administradores</p>
            </div>
            <div class="login-card-body">
                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
                
                <!-- Mensaje de prueba (temporal) -->
                <div class="alert alert-info">
                    <strong>⚠️ Modo de pruebas</strong><br>
                    Email: <code>asesor@inmobiliaria.com</code><br>
                    Admin: <code>admin@inmobiliaria.com</code>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">📧 Correo electrónico</label>
                        <input type="email" id="email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="password">🔒 Contraseña</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-login">🚀 Iniciar Sesión</button>
                </form>

                <div class="login-footer">
                    <p>¿No tienes cuenta? <a href="#" id="registroLink">Solicitar acceso</a></p>
                </div>
            </div>
        </div>
    </div>

    </body>
</html>
